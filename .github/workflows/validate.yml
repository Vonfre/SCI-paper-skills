name: Validate Skill Pack

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell syntax
        run: bash -n scripts/*.sh

      - name: Validate skill pack
        run: bash scripts/validate_skill_pack.sh
