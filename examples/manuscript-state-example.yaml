  field: "plant physiology"
  organism_material_system: "Arabidopsis guard cells"
  main_methods:
    - stomatal aperture assay
    - mutant complementation
    - ROS imaging
  available_artifacts:
    - rough figure list
    - result bullets
    - candidate target journal
  deadline_or_decision_context: ""
  missing_inputs:
    - "[NEED: exact sample sizes and statistical tests]"

journal_landscape:
  journal_portrait: "Target journal expects mechanistic plant biology with strong genetic and physiological evidence."
  author_constraints:
    - "[NEED: verify current author instructions before submission]"
  article_type_constraints:
    - "[NEED: verify current article type and figure limits]"
  comparable_papers:
