# Synthetic final state for examples/zero-to-one-sci-manuscript/.
# This is a workflow fixture, not a scientific record.
manuscript_state:
  state_version: "0.4"
  project_id: "aba-stomatal-closure-demo"
  updated_by_skill: "sci-submission-revision"
  current_stage: "submission readiness check"
  next_skill: "final repair before submission"
  global_blockers:
    - "[NEED: exact sample sizes, biological replicates, statistical tests, and P values]"
    - "[CITE: verified ABA guard-cell pathway sources]"
    - "[NEED: verify current target-journal author instructions]"

project:
  user_goal: "Use SCI-paper-skills from zero to one to build a target-journal-adaptive manuscript package."
  target_journal: "The Plant Cell"
  candidate_journals:
    - "Plant Physiology"
    - "[NEED: one lower-risk plant signaling journal]"
  target_level: "plant biology society journal"
  article_type: "research article"
  topic: "DRK1 and ABA-induced stomatal closure"
  field: "plant physiology"
  organism_material_system: "Arabidopsis guard cells"
  main_methods:
    - stomatal aperture assay
    - mutant complementation
    - ROS imaging
    - qPCR marker-gene assay
  available_artifacts:
    - rough result bullets
    - candidate figure list
    - target-journal preference
  deadline_or_decision_context: ""
  missing_inputs:
    - "[NEED: genotype details]"
    - "[NEED: raw figure panels]"
    - "[NEED: exact statistics]"

journal_landscape:
  journal_portrait: "Target journal likely requires mechanistic plant biology, strong genetic evidence, and clear advance for plant biology readers."
  author_constraints:
    - "[NEED: verify current author instructions, article type, figure limits, reference style, and data policy]"
  article_type_constraints:
    - "[NEED: verify current research-article limits before submission]"
  comparable_papers:
    - paper_id: "P1"
      citation: "[CITE: same-journal guard-cell ABA signaling paper]"
      doi_or_url: "[NEED: DOI/URL]"
      why_comparable: "Same broad target audience and ABA guard-cell signaling scope."
      pattern_to_reuse: "Phenotype -> rescue -> pathway-associated signal -> bounded mechanism."
    - paper_id: "P2"
      citation: "[CITE: peer-journal kinase/stomatal closure paper]"
      doi_or_url: "[NEED: DOI/URL]"
      why_comparable: "Comparable evidence ladder for a kinase-linked stomatal phenotype."
      pattern_to_reuse: "Use cautious pathway wording until direct mechanism is shown."
  fit_verdict: "Possible but risky"
  manuscript_must_prove:
    - "DRK1 phenotype is reproducible and statistically supported."
    - "DRK1 complementation links the phenotype to DRK1 disruption."
    - "ROS and transcript data support context without overstating direct mechanism."
  retrieval_dates:
    - "[NEED: retrieval date for current journal requirements]"
  journal_blockers:
    - "Mechanistic depth may be insufficient for the first-choice journal."

source_ledger:
  research_questions:
    - "What is established for ABA-induced stomatal closure?"
    - "How is ABA-induced ROS interpreted in guard-cell signaling?"
    - "What evidence is expected to place a kinase in an ABA pathway?"
  sources:
    - source_id: "S1"
      citation: "[CITE: verified ABA guard-cell signaling review]"
      doi_pmid_url: "[NEED: DOI/URL]"
      source_type: "review"
      metadata_status: "needs check"
      evidence_location: "Introduction background"
      supports_claim_ids:
        - "C1"
      contradicts_or_qualifies_claim_ids: []
      confidence: "plausible"
    - source_id: "S2"
      citation: "[CITE: verified ABA-induced ROS primary paper]"
      doi_pmid_url: "[NEED: DOI/URL]"
      source_type: "primary"
      metadata_status: "needs check"
      evidence_location: "Results interpretation and Discussion"
      supports_claim_ids:
        - "C3"
      contradicts_or_qualifies_claim_ids: []
      confidence: "plausible"
    - source_id: "S3"
      citation: "[CITE: verified ABA-responsive marker-gene source]"
      doi_pmid_url: "[NEED: DOI/URL]"
      source_type: "primary"
      metadata_status: "needs check"
      evidence_location: "Results 4 and Methods"
      supports_claim_ids:
        - "C4"
      contradicts_or_qualifies_claim_ids: []
      confidence: "unknown"

claim_registry:
  claims:
    - claim_id: "C1"
      linked_result_or_figure_ids:
        - "F1"
      observation: "drk1 mutants retain larger stomatal aperture than wild type after ABA treatment."
      user_interpretation: "DRK1 participates in ABA-induced stomatal closure."
      claim_level: "regulation"
      safe_wording: "DRK1 is required for full ABA-induced stomatal closure under the tested conditions."
      stronger_wording_if_fixed: "DRK1 directly regulates ABA-induced stomatal closure."
      evidence_needed_for_stronger_claim:
        - "direct pathway placement or substrate evidence"
        - "complete statistics and replicate reporting"
      citation_needs:
        - "[CITE: ABA guard-cell closure pathway]"
      status: "needs evidence"
    - claim_id: "C2"
      linked_result_or_figure_ids:
        - "F2"
      observation: "DRK1 complementation partially restores ABA-induced closure."
      user_interpretation: "The phenotype is linked to DRK1 disruption."
      claim_level: "causality"
      safe_wording: "Complementation supports a DRK1-linked contribution to the ABA response."
      stronger_wording_if_fixed: "DRK1 is sufficient to restore the pathway response."
      evidence_needed_for_stronger_claim:
        - "construct details"
        - "line expression validation"
        - "independent lines"
      citation_needs: []
      status: "needs evidence"
    - claim_id: "C3"
      linked_result_or_figure_ids:
        - "F3"
      observation: "ABA-induced ROS signal is weaker in drk1 guard cells."
      user_interpretation: "DRK1 may act in a ROS-linked ABA response branch."
      claim_level: "association"
      safe_wording: "DRK1 disruption is associated with reduced ABA-induced ROS accumulation."
      stronger_wording_if_fixed: "DRK1 acts upstream of ABA-induced ROS production."
      evidence_needed_for_stronger_claim:
        - "pathway ordering experiment"
        - "ROS rescue or epistasis analysis"
      citation_needs:
        - "[CITE: ABA-induced ROS in guard cells]"
      status: "needs evidence"
    - claim_id: "C4"
      linked_result_or_figure_ids:
        - "F4"
      observation: "Selected ABA-responsive marker genes change in drk1."
      user_interpretation: "DRK1 affects ABA-responsive transcription."
      claim_level: "association"
      safe_wording: "DRK1 perturbation alters selected ABA-responsive transcript markers."
      stronger_wording_if_fixed: "DRK1 controls the ABA transcriptional program."
      evidence_needed_for_stronger_claim:
        - "validated marker choice"
        - "broader transcriptomic or time-course evidence"
      citation_needs:
        - "[CITE: ABA-responsive marker-gene validation]"
      status: "needs evidence"

figure_registry:
  figures:
    - figure_id: "F1"
      title_or_label: "ABA stomatal aperture phenotype"
      role: "opening"
      answered_question: "Does DRK1 affect ABA-induced stomatal closure?"
      linked_claim_ids:
        - "C1"
      placement: "main"
      missing_panels_controls_stats:
        - "[NEED: ABA concentration and time point]"
        - "[NEED: sample size and statistical test]"
      transition_to_next_figure: "Test whether DRK1 complementation restores the response."
    - figure_id: "F2"
      title_or_label: "DRK1 complementation"
      role: "central proof"
      answered_question: "Is the phenotype linked to DRK1 disruption?"
      linked_claim_ids:
        - "C2"
      placement: "main"
      missing_panels_controls_stats:
        - "[NEED: complementation line validation]"
        - "[NEED: replicate count]"
      transition_to_next_figure: "Ask whether the DRK1-linked phenotype connects to ABA-induced ROS."
    - figure_id: "F3"
      title_or_label: "ABA-induced ROS imaging"
      role: "validation"
      answered_question: "Is DRK1 associated with ABA-triggered ROS accumulation?"
      linked_claim_ids:
        - "C3"
      placement: "main"
      missing_panels_controls_stats:
        - "[NEED: imaging quantification]"
        - "[NEED: ROS probe and controls]"
      transition_to_next_figure: "Add transcript marker evidence without overclaiming mechanism."
    - figure_id: "F4"
      title_or_label: "ABA-responsive marker-gene qPCR"
      role: "extension"
      answered_question: "Are selected ABA-responsive transcripts altered in drk1?"
      linked_claim_ids:
        - "C4"
      placement: "main or supplement"
      missing_panels_controls_stats:
        - "[NEED: marker gene validation]"
        - "[NEED: normalization and replicate details]"
      transition_to_next_figure: "Move to Discussion and limitations."

