      metadata_status: "needs check"
      evidence_location: "background framing"
      supports_claim_ids:
        - "C1"
      contradicts_or_qualifies_claim_ids: []
      confidence: "plausible"

claim_registry:
  claims:
    - claim_id: "C1"
      linked_result_or_figure_ids:
        - "F1"
      observation: "drk1 mutants show wider stomatal aperture after ABA treatment than wild type."
      user_interpretation: "DRK1 participates in ABA-induced stomatal closure."
      claim_level: "regulation"
      safe_wording: "DRK1 is required for full ABA-induced stomatal closure under the tested conditions."
      stronger_wording_if_fixed: "DRK1 directly regulates ABA-induced stomatal closure."
      evidence_needed_for_stronger_claim:
        - "direct substrate or pathway evidence"
        - "rescue/complementation"
      citation_needs:
        - "[CITE: ABA stomatal closure pathway]"
      status: "needs evidence"

figure_registry:
  figures:
    - figure_id: "F1"
      title_or_label: "ABA stomatal aperture assay"
      role: "opening"
      answered_question: "Does DRK1 affect ABA-induced stomatal closure?"
