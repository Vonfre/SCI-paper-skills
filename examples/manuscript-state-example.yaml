source_ledger:
  research_questions:
    - "What is known about ABA-induced stomatal closure pathways?"
    - "Are DRK-family kinases reported in guard-cell signaling?"
  sources:
    - source_id: "S1"
      citation: "[CITE: ABA guard-cell review]"
      doi_pmid_url: "[NEED: DOI/URL]"
